<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Sentiment Analytics Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            🤖 AI Sentiment Dashboard
        </a>

        <div>

            <a class="btn btn-outline-light me-2" href="/">
                Home
            </a>

            <a class="btn btn-outline-light me-2" href="/dashboard">
                Dashboard
            </a>

            <a class="btn btn-outline-light" href="/history">
                History
            </a>
            <a class="btn btn-outline-light me-2" href="/upload">
    Upload CSV
</a>

        </div>

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-center mb-4">
            AI-Powered Sentiment Analytics Dashboard
        </h1>

        <form method="POST">

            <textarea
                class="form-control mb-3"
                rows="6"
                name="review"
                placeholder="Write your review here..."
                required></textarea>

            <button class="btn btn-primary w-100">
                Analyze Sentiment
            </button>

        </form>

        {% if result %}

        <div class="alert alert-info mt-4">

            <h4>Prediction</h4>

            <h5>
                {{ result[0]['label'] }}
            </h5>

            <h5>
                Confidence:
                {{ "%.2f"|format(result[0]['score']*100) }}%
            </h5>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
